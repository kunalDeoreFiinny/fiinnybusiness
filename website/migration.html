            {

            },
            {

                date: "April 6, 2026",
                readTime: "5 min read",
                author: "Fiinny Team",
                categories: ["Wealth", "Basics", "Philosophy"],
                coverImage: "/assets/blog/budgeting-rule.png",
                seoTitle: "Modern 50 30 20 Budgeting Rule for 2026 | Fiinny",
                seoDescription: "How to use the 50 30 20 budgeting framework to balance needs, wants, and savings in today's high-rent economy with Fiinny's automated tracking.",
                keywords: ["50 30 20 rule", "how to budget", "financial planning hacks"],
                content: `<p class="lead text-xl mb-8 font-medium text-slate-700">The 50/30/20 rule is simple: 50% Needs, 30% Wants, 20% Savings. But in a 2026 economy where rent is sky-high, the old definitions need a reality check.</p><div class="space-y-6 my-12"><div class="flex items-center gap-6 p-6 bg-white rounded-3xl border border-slate-100 shadow-sm"><div class="w-16 h-16 rounded-full bg-teal-500 flex items-center justify-center text-white font-black">50%</div><div><h4 class="font-bold text-slate-900">Needs (The Foundation)</h4><p class="text-slate-500 text-sm">Rent, Groceries, and Basic Utilities. If it keeps you safe and working, it's a Need.</p></div></div><div class="flex items-center gap-6 p-6 bg-white rounded-3xl border border-slate-100 shadow-sm"><div class="w-16 h-16 rounded-full bg-indigo-500 flex items-center justify-center text-white font-black">30%</div><div><h4 class="font-bold text-slate-900">Wants (The Lifestyle)</h4><p class="text-slate-500 text-sm">Dining out, Travel, and that extra latte. This is your "Enjoy Life" fund.</p></div></div><div class="flex items-center gap-6 p-6 bg-white rounded-3xl border border-slate-100 shadow-sm"><div class="w-16 h-16 rounded-full bg-emerald-500 flex items-center justify-center text-white font-black">20%</div><div><h4 class="font-bold text-slate-900">Future (Savings)</h4><p class="text-slate-500 text-sm">Emergency funds and Debt payments. Your future self will thank you.</p></div></div></div><p class="mb-6 text-slate-600 font-medium">Fiinny visualizes this split for you. Our auto-categorization tells you exactly where you stand, making it easy to see if your 'Wants' are eating into your 'Future'.</p>`
            },
            {
                slug: "digital-nomad-finance-guide",
                title: "Financial Freedom for Digital Nomads: Global Tracking",
                excerpt: "Traveling the world while working? Discover why a private, non-bank-tethered expense tracker is essential for the modern nomadic lifestyle.",
                date: "April 7, 2026",
                readTime: "7 min read",
                author: "Arjun Tanpure",
                categories: ["Lifestyle", "Global", "Security"],
                coverImage: "/assets/blog/digital-nomad.png",
                seoTitle: "Best Expense Tracker for Digital Nomads 2026 | Fiinny",
                seoDescription: "Managing cross-border finances and currency tracking privately as a digital nomad with Fiinny's secure and on-device platform.",
                keywords: ["digital nomad budgeting", "international expense tracking", "nomadic lifestyle finance"],
                content: `<p class="lead text-xl mb-8 font-medium text-slate-700">Digital nomads live a lifestyle of freedom—but their finances are often a chaotic mess of multiple banks, currencies, and zero privacy.</p><h2 class="text-3xl font-black mb-6 mt-12 text-slate-900 tracking-tight">The Borderless Challenge</h2><p class="mb-6 leading-relaxed text-slate-600">When your money is spread across an Indian account, a US account, and a Revolut card, tracking your actual net worth becomes impossible. Most apps breaking the moment you cross a border or switch a currency.</p><h2 class="text-3xl font-black mb-6 mt-12 text-slate-900 tracking-tight">Why Fiinny is Different</h2><p class="mb-6 text-slate-600 font-medium">Because Fiinny is focused on on-device logic, it’s the perfect tool for someone spending in multiple currencies with total privacy. Own your financial identity, wherever the Wi-Fi takes you.</p>`
            },

            }
        ];

        const log = document.getElementById("log");
        const btn = document.getElementById("startBtn");

        const addLog = (msg, className = "") => {
            const div = document.createElement("div");
            div.className = "post-item " + className;
            div.textContent = msg;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        };

        btn.addEventListener("click", async () => {
            btn.disabled = true;
            log.innerHTML = "";
            addLog("Starting migration...");

            try {
                const postsRef = collection(db, "posts");

                for (const post of blogPosts) {
                    addLog(`Processing: ${post.slug}...`);
                    
                    const q = query(postsRef, where("slug", "==", post.slug));
                    const snapshot = await getDocs(q);

                    if (snapshot.empty) {
                        await addDoc(postsRef, {
                            ...post,
                            published: true,
                            createdAt: Timestamp.now(),
                            updatedAt: Timestamp.now()
                        });
                        addLog(`✓ Created: ${post.slug}`, "status-created");
                    } else {
                        addLog(`- Skipped: ${post.slug} (Exists)`);
                    }
                }
                addLog("Migration finished successfully!");
            } catch (err) {
                console.error(err);
                addLog(`ERROR: ${err.message}`, "status-error");
            }
        });
