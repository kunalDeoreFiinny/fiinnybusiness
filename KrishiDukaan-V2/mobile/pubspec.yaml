name: krishidukan_mobile
description: "KrishiDukan mobile app — agri-commerce platform."
publish_to: 'none'
version: 1.0.0+4

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.7

  # Networking
  dio: ^5.5.0+1

  # Local storage
  shared_preferences: ^2.3.2

  # Utilities
  intl: ^0.20.2
  collection: ^1.18.0

  # UI helpers
  cached_network_image: ^3.4.1
  smooth_page_indicator: ^1.2.0
  shimmer: ^3.0.0
  url_launcher: ^6.3.0

  # Firebase — config files placed under android/app and ios/Runner
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Native integrations (kept commented until features need them):
  # firebase_messaging: ^15.1.3
  google_maps_flutter: ^2.9.0
  razorpay_flutter: ^1.3.7
  image_picker: ^1.1.2
  firebase_storage: ^12.3.2
  # geolocator: ^13.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - asset/images/
    - asset/product-images/Product_Images/
