name: Deploy KaranArjun SaaS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: KARANARJUNKSKPVTLTD/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: KARANARJUNKSKPVTLTD

      - name: Build
        run: npm run build
        working-directory: KARANARJUNKSKPVTLTD
        env:
          VITE_RECAPTCHA_KEY: ${{ secrets.VITE_RECAPTCHA_KEY }}

      - name: Install Firebase CLI
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npm install -g firebase-tools

      - name: Deploy to Firebase (Hosting + Rules + Functions)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: firebase deploy --only hosting,firestore:rules,functions --token "$FIREBASE_TOKEN" --project karanarjun-pvt-ltd
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
